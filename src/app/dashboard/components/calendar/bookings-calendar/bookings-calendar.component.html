<div class="bookings-calendar-container">
    <div class="bookings-calendar-scrollable">
        <div class="calend-header" id="calendar-header">
            <div class="page-content" style="padding-top: 16px;">
                <div class="container-fluid">
                    <div class="row">
                        <div class="col-xl-2">
                            <h3 class="mb-0 mt-3">{{currentCalendarDate | date:'MMMM, yyyy'}}</h3>
                        </div>
                        <div class="col-xl-2 pt-1">
                            <app-select-image
                                *ngIf="!loading"
                                [options]="serviceOptions"
                                [placeholder]="'Filter by service'"
                                [multiSelect]="true"
                                [showAllOption]="true"
                                [showColors]="true"
                                [showImages]="false"
                                [cardBackgroundClass]="'bg-light'"
                                [autoSelectFirst]="false"
                                (selectionChange)="onServiceSelectionChange($event)">
                            </app-select-image>
                            <div *ngIf="loading" >
                                <ngx-skeleton-loader [count]="1" [theme]="{ 'border-radius': '16px', height: '48px', margin: '0px 0px 10px 0px', 'background-color': '#FFFFFFF' }"></ngx-skeleton-loader>
                            </div>
                        </div>
                        <div class="col-xl-4">
                            <div class="card bg-light mt-1">
                                <ul class="nav nav-pills nav-justified p-1" role="tablist">
                                    <li *ngIf="hasPermission('calendar.monthly')" class="nav-item waves-effect waves-light me-1 ms-1" role="presentation" >
                                        <a class="nav-link" data-bs-toggle="tab" href="#month" role="tab" 
                                        aria-selected="false" (click)="onTabChanged('Month')"
                                        [ngClass]="{'active': tabActive === 'Month'}">
                                            <span class="d-block d-sm-none"><i class="fas fa-home"></i></span>
                                            <span class="d-none d-sm-block">Month</span>
                                        </a>
                                    </li>
                                    <li *ngIf="hasPermission('calendar.weekly')" class="nav-item waves-effect waves-light me-1 ms-1" role="presentation" >
                                        <a class="nav-link" data-bs-toggle="tab" href="#week" role="tab"
                                            aria-selected="false" (click)="onTabChanged('Week')"
                                            [ngClass]="{'active': tabActive === 'Week'}">
                                            <span class="d-block d-sm-none"><i class="far fa-user"></i></span>
                                            <span class="d-none d-sm-block">Week</span>
                                        </a>
                                    </li>
                                    <li *ngIf="hasPermission('calendar.daily')" class="nav-item waves-effect waves-light me-1 ms-1" role="presentation" >
                                        <a class="nav-link" data-bs-toggle="tab" href="#day" role="tab" aria-selected="false"
                                            tabindex="-1" (click)="onTabChanged('Day')"
                                            [ngClass]="{'active': tabActive === 'Day'}">
                                            <span class="d-block d-sm-none"><i class="far fa-envelope"></i></span>
                                            <span class="d-none d-sm-block">Day</span>
                                        </a>
                                    </li>
                                    <li *ngIf="hasPermission('calendar.supplier')" class="nav-item waves-effect waves-light me-1 ms-1" role="presentation" >
                                        <a class="nav-link" data-bs-toggle="tab" href="#stylists" role="tab" aria-selected="false"
                                            tabindex="-1" (click)="onTabChanged('Stylists')"
                                            [ngClass]="{'active': tabActive === 'Stylists'}">
                                            <span class="d-block d-sm-none"><i class="far fa-face-smile"></i></span>
                                            <span class="d-none d-sm-block">Stylists</span>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </div>

                        <div class="col-xl-2 pt-1">
                            <app-select-image
                                *ngIf="!loading"
                                [options]="stylistOptions"
                                [placeholder]="'Filter by stylist'"
                                [multiSelect]="!isStylistUser"
                                [showAllOption]="!isStylistUser"
                                [showColors]="true"
                                [showImages]="true"
                                [cardBackgroundClass]="'bg-light'"
                                [autoSelectFirst]="false"
                                [disabled]="stylistFilterDisabled"
                                (selectionChange)="onStylistSelectionChange($event)">
                            </app-select-image>
                            <div *ngIf="loading"> 
                                <ngx-skeleton-loader [count]="1" [theme]="{ 'border-radius': '16px', height: '48px', margin: '0px 0px 10px 0px', 'background-color': '#FFFFFFF' }"></ngx-skeleton-loader>
                            </div>
                        </div>

                        <div *ngIf="tabActive === 'Month'" class="col-xl-2 p-0 animated fadeIn fast">
                            <div class="d-flex flex-wrap gap-2 pt-1 justify-content-end align-items-start h-100">
                                <button class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-plus"></i></button>
                                <button (click)="changeDateCalendarMonthly(true)" class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-chevron-left"></i></button>
                                <button (click)="setTodayDateCalendarMonthly()" [ngClass]="{'btn-dark': dateCalendarMonthly.getMonth() == dateNow.getMonth() && dateCalendarMonthly.getFullYear() == dateNow.getFullYear(), 'btn-light btn-calendar-nav': dateCalendarMonthly.getMonth() != dateNow.getMonth() || dateCalendarMonthly.getFullYear() != dateNow.getFullYear()}" class="btn shadow-sm btn-calendar-number w-25">{{dateCalendarMonthly.toLocaleDateString('es-ES', { month: 'short' })}}</button>
                                <button (click)="changeDateCalendarMonthly(false)" class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-chevron-right"></i></button>
                            </div>
                        </div>

                        <div *ngIf="tabActive === 'Week'" class="col-xl-2 p-0 animated fadeIn fast">
                            <div class="d-flex flex-wrap gap-2 pt-1 justify-content-end align-items-start h-100">
                                <button class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-plus"></i></button>
                                <button (click)="changeDateCalendarWeekly(true)" class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-chevron-left"></i></button>
                                <button (click)="setTodayDateCalendarWeekly()" [ngClass]="{'btn-dark': dateCalendarWeekly.getDate() == dateNow.getDate(), 'btn-light btn-calendar-nav': dateCalendarWeekly.getDate() != dateNow.getDate()}" class="btn shadow-sm btn-calendar-number w-25">{{dateCalendarWeekly.getDate()}}</button>
                                <button (click)="changeDateCalendarWeekly(false)" class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-chevron-right"></i></button>
                            </div>
                        </div>

                        <div *ngIf="tabActive === 'Day'" class="col-xl-2 p-0 animated fadeIn fast">
                            <div class="d-flex flex-wrap gap-2 pt-1 justify-content-end align-items-start h-100">
                                <button class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-plus"></i></button>
                                <button (click)="changeDateCalendarDaily(true)" class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-chevron-left"></i></button>
                                <button (click)="setTodayDateCalendarDaily()" [ngClass]="{'btn-dark': dateCalendarDaily.getDate() == dateNow.getDate(), 'btn-light btn-calendar-nav': dateCalendarDaily.getDate() != dateNow.getDate()}" class="btn shadow-sm btn-calendar-number w-25">{{dateCalendarDaily.getDate()}}</button>
                                <button (click)="changeDateCalendarDaily(false)" class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-chevron-right"></i></button>
                            </div>
                        </div>

                        <div *ngIf="tabActive === 'Stylists'" class="col-xl-2 p-0 animated fadeIn fast">
                            <div class="d-flex flex-wrap gap-2 pt-1 justify-content-end align-items-start h-100">
                                <button class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-plus"></i></button>
                                <button (click)="changeDateBookingsSupplier(true)" class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-chevron-left"></i></button>
                                <button (click)="setTodayDateBookingsSupplier()" [ngClass]="{'btn-dark': dateBookingsSupplier.getDate() == dateNow.getDate(), 'btn-light btn-calendar-nav': dateBookingsSupplier.getDate() != dateNow.getDate()}" class="btn shadow-sm btn-calendar-number w-25">{{dateBookingsSupplier.getDate()}}</button>
                                <button (click)="changeDateBookingsSupplier(false)" class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-chevron-right"></i></button>
                            </div>
                        </div>

                        <div *ngIf="tabActive === 'Floor'" class="col-xl-2 p-0 animated fadeIn fast">
                            <div class="d-flex flex-wrap gap-2 pt-1 justify-content-end align-items-start h-100">
                                <button class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-plus"></i></button>
                                <button class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-chevron-left"></i></button>
                                <button class="btn btn-light shadow-sm btn-calendar-nav w-25">First Floor</button>
                                <button class="btn btn-light shadow-sm btn-calendar-nav"><i class="bx bx-chevron-right"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div *ngIf="!loading" class="calendar-content">
            <app-calendar-monthly *ngIf="hasPermission('calendar.monthly')" [ngStyle]="{'display': tabActive === 'Month' ? 'block' : 'none' }"  [date]="dateCalendarMonthly" [services]="servicesSelected" [stylists]="stylistsSelected" [users]="users" [salonId]="selectedSalonId" (weekSelected)="onWeekSelectedFromMonthly($event)"></app-calendar-monthly>
            <app-calendar-weekly *ngIf="hasPermission('calendar.weekly')" [ngStyle]="{'display': tabActive === 'Week' ? 'block' : 'none' }"  [date]="dateCalendarWeekly"  [services]="servicesSelected" [stylists]="stylistsSelected" [users]="users" [salonId]="selectedSalonId" (daySelected)="onDaySelectedFromWeekly($event)"></app-calendar-weekly>
            <app-calendar-daily *ngIf="hasPermission('calendar.daily')" [ngStyle]="{'display': tabActive === 'Day' ? 'block' : 'none' }"  [date]="dateCalendarDaily" [services]="servicesSelected" [stylists]="stylistsSelected" [users]="users" [salonId]="selectedSalonId"></app-calendar-daily>
            <app-bookings-supplier *ngIf="hasPermission('calendar.supplier')" [ngStyle]="{'display': tabActive === 'Stylists' ? 'block' : 'none' }"  [date]="dateBookingsSupplier" [services]="servicesSelected" [stylists]="stylistsSelected" [users]="users" [salonId]="selectedSalonId"></app-bookings-supplier>    
        </div>
    </div>
</div>
