<div class="page-content">
    <div class="container-fluid dashboard-scrollable">  
        <div class="row dashboard-row">
            <div class="main-content-col" [class.expanded]="!isStylistPanelVisible">
                <div class="row">
                    <app-dashboard-header  
                        [kpiCards]="kpiCards"
                        [loading]="loadingCharts.kpiCards">
                    </app-dashboard-header>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="d-flex align-items-start">
                            <div class="flex-grow-1">
                                <h5 class="card-title mb-3" *ngIf="!loadingCharts.revenueChart">Revenue chart</h5>
                                <ngx-skeleton-loader *ngIf="loadingCharts.revenueChart" count="1" appearance="line" [theme]="{ height: '20px', width: '150px', 'border-radius': '6px' }"></ngx-skeleton-loader>
                            </div>
                        </div>
                        <app-skelleton-bar-revenue-chart *ngIf="loadingCharts.revenueChart && !revenueChart"></app-skelleton-bar-revenue-chart>
                        <app-bar-revenue-chart *ngIf="!loadingCharts.revenueChart && revenueChart" [revenueChart]="revenueChart"></app-bar-revenue-chart>
                    </div>
                </div>

                <div class="row">
                    <div class="col-lg-4">
                        <app-revenue-activity 
                            [revenueActivity]="revenueActivity"
                            [loading]="loadingCharts.revenueActivity">
                        </app-revenue-activity>
                    </div>
                    <div class="col-lg-4">
                        <app-booking-stats 
                            [orderStats]="orderStats"
                            [loading]="loadingCharts.orderStats">
                        </app-booking-stats>
                    </div>
                    <div class="col-lg-4">
                        <app-top-products 
                            [topServices]="topServices"
                            [loading]="loadingCharts.topServices">
                        </app-top-products>
                    </div>
                </div>

            </div>
            <div class="stylist-panel-col" [class.visible]="isStylistPanelVisible">
                <app-stylist-resume></app-stylist-resume>
            </div>
        </div>
    </div>
</div>
